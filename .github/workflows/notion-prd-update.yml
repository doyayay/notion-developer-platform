name: Update Notion PRD on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  update-prd:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Extract Notion page ID from PR body
        id: extract
        run: |
          PAGE_ID=$(echo "${{ github.event.pull_request.body }}" | grep -oP '(?<=<!-- notion-prd-page-id: )[\w-]+(?= -->)' || true)
          echo "page_id=$PAGE_ID" >> $GITHUB_OUTPUT
          echo "pr_url=${{ github.event.pull_request.html_url }}" >> $GITHUB_OUTPUT
          echo "commit_summary=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT

      - name: Skip if no Notion page ID
        if: steps.extract.outputs.page_id == ''
        run: |
          echo "No Notion page ID found in PR body. Skipping."
          exit 0

      - name: Update Notion PRD via API
        if: steps.extract.outputs.page_id != ''
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
        run: |
          curl -s -X PATCH "https://api.notion.com/v1/pages/${{ steps.extract.outputs.page_id }}" \
            -H "Authorization: Bearer $NOTION_API_TOKEN" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{
              "properties": {
                "상태": { "status": { "name": "Implemented" } },
                "GitHub PR": { "url": "${{ steps.extract.outputs.pr_url }}" },
                "Commit Summary": {
                  "rich_text": [{ "text": { "content": "${{ steps.extract.outputs.commit_summary }}" } }]
                }
              }
            }'
